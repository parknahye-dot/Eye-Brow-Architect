name: Build and Deploy to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY_BACKEND: brow-architect-backend
  ECR_REPOSITORY_FRONTEND: brow-architect-frontend
  ECR_REPOSITORY_AI: brow-architect-ai
  EKS_CLUSTER_NAME: brow-architect-cluster

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push Backend image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG

      - name: Build, tag, and push Frontend image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          cd Frontend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG

      - name: Build, tag, and push AI Service image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          cd AI_Service
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_AI:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_AI:$IMAGE_TAG

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Deploy to EKS
        env:
          TARGET_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          TARGET_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          TARGET_SECRET_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          # Use python for safe replacement (avoids sed delimiter issues and shadows)
          python3 -c "import os; \
            content = open('AWS/eks_deployment.yaml').read(); \
            content = content.replace('${AWS_ACCOUNT_ID}', os.environ['TARGET_ACCOUNT_ID']); \
            content = content.replace('${AWS_ACCESS_KEY_ID}', os.environ['TARGET_ACCESS_KEY']); \
            content = content.replace('${AWS_SECRET_ACCESS_KEY}', os.environ['TARGET_SECRET_KEY']); \
            open('AWS/eks_deployment_ready.yaml', 'w').write(content)"
          
          kubectl apply -f AWS/eks_deployment_ready.yaml
          # Force restart deployments to pull the latest image updates
          kubectl rollout restart deployment/frontend
          kubectl rollout restart deployment/backend
          kubectl rollout restart deployment/ai-service
