apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        image: 973759794851.dkr.ecr.ap-northeast-2.amazonaws.com/brow-architect-ai:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
spec:
  selector:
    app: ai-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 973759794851.dkr.ecr.ap-northeast-2.amazonaws.com/brow-architect-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: AI_SERVICE_URL
          value: "http://ai-service:8000/analyze"
        # Database credentials should ideally be in a Secret
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://terraform-20260312011224642300000003.cf64ggy2eo8o.ap-northeast-2.rds.amazonaws.com:3306/eyebrow_db?serverTimezone=UTC&useUniCode=yes&characterEncoding=UTF-8"
        - name: SPRING_DATASOURCE_USERNAME
          value: "nahye_admin"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "nahye1234"
        - name: AMAZON_LEX_BOT_ID
          value: "93G9BEFBTR"
        - name: AMAZON_LEX_BOT_ALIAS_ID
          value: "TSTALIASID"
        - name: SPRING_APPLICATION_JSON
          value: '{"amazon":{"lex":{"botId":"93G9BEFBTR","botAliasId":"TSTALIASID"}}}'
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: AWS_SECRET_ACCESS_KEY
        - name: APP_STORAGE_LOCAL
          value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 973759794851.dkr.ecr.ap-northeast-2.amazonaws.com/brow-architect-frontend:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
      volumes:
      - name: nginx-config
        configMap:
          name: frontend-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
