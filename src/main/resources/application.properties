spring.application.name=EyeBrowArchitect

# 1. 로컬 MySQL 연결 설정
spring.datasource.url=jdbc:mysql://localhost:3306/eyebrow_architect?serverTimezone=UTC&useUniCode=yes&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=1234
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 2. AWS S3 및 리전 설정
spring.cloud.aws.s3.bucket=brow-architect-storage-nahye
spring.cloud.aws.region.static=ap-northeast-2
spring.cloud.aws.stack.auto=false

# 3. AWS 자격 증명 (Placeholder)
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY:NONE}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_KEY:NONE}

# 4. AWS Lex 봇 설정 (실제 연동)
amazon.lex.botId=93G9BEFBTR
amazon.lex.botAliasId=TSTALIASID
amazon.lex.localeId=ko_KR

# 5. 저장소 설정 (S3 권한 이슈 대응용 로컬 강제 모드)
app.storage.local=true

# 6. 파일 업로드 용량 제한
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# 7. AI Service (Python FastAPI) 연동
ai.service.url=http://localhost:8000/analyze